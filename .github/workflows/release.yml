name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Resolve artifact path
        id: artifact
        run: echo "path=$(ls build/distributions/*.zip)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Auto Build on Save ${{ github.ref_name }}"
          body: |
            ## Installation

            1. Download the `.zip` file attached below.
            2. In IntelliJ / Android Studio, go to **Settings → Plugins → ⚙ → Install Plugin from Disk…**
            3. Select the downloaded `.zip` and restart the IDE.
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
