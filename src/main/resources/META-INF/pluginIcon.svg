      <stop offset="0%" stop-color="#5B9DFF"/>
      <stop offset="100%" stop-color="#1755CB"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="40" height="40" rx="8" fill="url(#bg)"/>
