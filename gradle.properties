pluginGroup = com.autobuild
pluginName = Auto Build on Save
pluginVersion = 1.0.0

# Target IDE: Android Studio (based on IntelliJ)
# Use a recent stable IntelliJ platform version
platformType = IC
platformVersion = 2024.1

# Suppress expected deprecation warnings from the IntelliJ Gradle plugin
org.gradle.jvmargs = -Xmx2048m
kotlin.stdlib.default.dependency = false
